<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大福 · DAFU</title>
  
  <!-- Google Fonts：圆润标题 + 清晰正文 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ========================
       设计令牌 / CSS Variables（奶油系配色）
       ======================== */
    :root {
      --bg: #FFFBF5;              /* 奶油白 */
      --bg-soft: #FFF7EA;         /* 浅杏白 */
      --text: #5A4A3C;            /* 暖棕灰 */
      --text-light: #6B5D4E;      /* 柔和浅灰（加深满足WCAG AA对比度） */
      --accent: #E08060;          /* 奶橘色（加深满足WCAG AA对比度） */
      --accent-soft: #FFD8B8;     /* 浅杏橘 */
      --accent-dark: #C5704A;     /* 深奶橘（加深） */
      --border: #F0D9C5;          /* 奶油边框 */
      --error: #C05A4A;           /* 错误/删除红 */
      --error-soft: rgba(192, 90, 74, 0.08);
      --shadow: 0 4px 20px rgba(90, 74, 60, 0.06);
      --shadow-hover: 0 8px 30px rgba(90, 74, 60, 0.1);
      --radius: 14px;
      --radius-sm: 10px;
      --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --max-width: 1200px;
      --font-display: 'Quicksand', sans-serif;
      --font-body: 'Noto Sans SC', sans-serif;
      --font-heading: 'Noto Serif SC', serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.9;
      font-weight: 400;
      font-size: 1.05rem;
      letter-spacing: 0.02em;
      -webkit-font-smoothing: antialiased;
      transition: padding-top 0.3s ease;
    }

    /* 装饰性小标签文字 */
    .label {
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent-dark);
    }

    /* ========================
       管理员模式相关样式
       ======================== */
    .admin-only {
      display: none !important;
    }

    body.admin-mode .admin-only {
      display: flex !important;
    }

    /* 保留原始 inline-flex 的按钮，避免被 flex 覆盖导致拉伸 */
    body.admin-mode .add-btn.admin-only,
    body.admin-mode .upload-btn.admin-only,
    body.admin-mode .edit-text-btn.admin-only,
    body.admin-mode .exit-admin-btn.admin-only {
      display: inline-flex !important;
    }

    body.admin-mode .admin-only.inline {
      display: inline-flex !important;
    }

    body.admin-mode .admin-only.block {
      display: block !important;
    }

    /* 可编辑文字高亮 */
    .editable-text {
      transition: var(--transition);
      cursor: default;
    }

    body.text-edit-mode .editable-text {
      border: 1.5px dashed var(--accent);
      background: rgba(224, 128, 96, 0.06);
      padding: 0.2rem 0.5rem;
      border-radius: var(--radius-sm);
      cursor: text;
    }

    body.text-edit-mode .editable-text:focus {
      outline: none;
      background: rgba(224, 128, 96, 0.12);
    }

    /* 管理员模式提示条 */
    .admin-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 99;
      background: rgba(255, 216, 184, 0.92);
      backdrop-filter: blur(8px);
      color: var(--accent-dark);
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.6rem 1rem;
      text-align: center;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }

    body.admin-mode .admin-bar {
      transform: translateY(0);
    }

    body.admin-mode {
      padding-top: 2.2rem;
    }

    /* 底部固定编辑工具栏 */
    .text-editor-toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(255, 251, 245, 0.96);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 0.9rem 1.5rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      z-index: 150;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    body.text-edit-mode .text-editor-toolbar {
      transform: translateY(0);
    }

    /* ========================
       导航栏
       ======================== */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      padding: 1.5rem 4vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: var(--transition);
    }

    body.admin-mode nav {
      top: 2.4rem;
    }

    nav.scrolled {
      background: rgba(255, 251, 245, 0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 2px 16px rgba(90, 74, 60, 0.04);
      padding: 1rem 4vw;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-light);
      font-size: 0.95rem;
      font-weight: 500;
      position: relative;
      transition: var(--transition);
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      border-radius: 2px;
      background: var(--accent);
      transition: var(--transition);
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-links a.active {
      color: var(--text);
    }

    .nav-links a.active::after {
      width: 100%;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      padding: 8px;
      background: none;
      border: none;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      border-radius: 2px;
      background: var(--text);
      transition: var(--transition);
    }

    .exit-admin-btn,
    .edit-text-btn {
      padding: 0.5rem 1.2rem;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      white-space: nowrap;
    }

    .exit-admin-btn:hover,
    .edit-text-btn:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-dark);
    }

    .edit-text-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent-dark);
    }

    /* 管理员入口按钮（始终可见） */
    .admin-entry-btn {
      width: 34px;
      height: 34px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text-light);
      font-size: 1rem;
      cursor: pointer;
      border-radius: 50%;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }

    .admin-entry-btn:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-dark);
    }

    body.admin-mode .admin-entry-btn {
      display: none;
    }

    /* ========================
       通用容器与分栏
       ======================== */
    section {
      padding: 8rem 4vw;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }

    /* ========================
       Hero 首屏
       ======================== */
    #hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 6rem;
      background: var(--bg-soft);
    }

    #hero .split {
      align-items: center;
    }

    .hero-text h1 {
      font-family: var(--font-heading);
      font-size: clamp(3.2rem, 7vw, 5.5rem);
      font-weight: 600;
      line-height: 1.1;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .hero-text .subtitle {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: block;
    }

    .hero-text p {
      color: var(--text-light);
      max-width: 440px;
      font-size: 1.1rem;
      line-height: 2;
      font-weight: 400;
    }

    .hero-img {
      position: relative;
      aspect-ratio: 1 / 1;
      background: var(--accent-soft);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-hover);
    }

    .hero-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.8s ease;
    }

    .hero-img:hover img {
      transform: scale(1.02);
    }

    .frame-deco {
      position: absolute;
      inset: 12px;
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius-sm);
      pointer-events: none;
    }

    /* ========================
       关于板块
       ======================== */
    #about {
      background: var(--bg);
    }

    .about-text h2 {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 4.5vw, 2.8rem);
      font-weight: 600;
      margin-bottom: 2rem;
    }

    .info-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      background: var(--bg-soft);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .info-label {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--bg);
      background: var(--accent);
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      min-width: auto;
      white-space: nowrap;
    }

    .info-content {
      flex: 1;
      color: var(--text);
      font-weight: 500;
      font-size: 1rem;
    }

    .info-actions {
      display: flex;
      gap: 0.5rem;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      border-radius: 50%;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      color: var(--text-light);
    }

    .icon-btn:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-dark);
    }

    .icon-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
    }

    .add-btn {
      margin-top: 1.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.4rem;
      border: 1.5px dashed var(--accent);
      background: transparent;
      color: var(--accent-dark);
      font-size: 0.85rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }

    .add-btn:hover {
      background: var(--accent-soft);
      color: var(--accent-dark);
      border-style: solid;
    }

    .about-img {
      position: relative;
      background: var(--bg-soft);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .about-img img {
      width: 100%;
      display: block;
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .about-img::before {
      content: '';
      position: absolute;
      top: -16px;
      right: -16px;
      width: 60%;
      height: 60%;
      background: var(--accent-soft);
      border-radius: var(--radius);
      z-index: -1;
    }

    /* ========================
       相册板块（核心）
       ======================== */
    #gallery {
      background: var(--bg-soft);
    }

    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 3rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .gallery-header h2 {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 4.5vw, 2.8rem);
      font-weight: 600;
    }

    .upload-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      box-shadow: 0 4px 12px rgba(224, 128, 96, 0.25);
    }

    .upload-btn:hover {
      background: var(--accent-dark);
      box-shadow: 0 6px 18px rgba(224, 128, 96, 0.35);
      transform: translateY(-1px);
    }

    .upload-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
    }

    .upload-progress {
      width: 120px;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }

    .upload-progress .bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* 图片网格 */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .photo-card {
      position: relative;
      aspect-ratio: 1 / 1;
      background: var(--bg);
      padding: 8px;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      transition: var(--transition);
      cursor: pointer;
      overflow: hidden;
    }

    .photo-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-4px);
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: calc(var(--radius-sm) - 4px);
      transition: transform 0.6s ease;
    }

    .photo-card:hover img {
      transform: scale(1.03);
    }

    .photo-card .delete-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transform: translateY(-4px);
      transition: var(--transition);
      z-index: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .photo-card:hover .delete-btn {
      opacity: 1;
      transform: translateY(0);
    }

    /* 管理员模式下删除按钮始终可见（移动端无 hover） */
    body.admin-mode .photo-card .delete-btn {
      opacity: 1;
      transform: translateY(0);
    }

    .delete-btn:hover {
      background: #fff;
      color: var(--error);
    }

    .delete-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
    }

    .gallery-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 0;
      color: var(--text-light);
    }

    .gallery-loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 0;
      color: var(--text-light);
      font-family: var(--font-display);
      font-weight: 500;
    }

    /* ========================
       成长时间线
       ======================== */
    #timeline {
      background: var(--bg);
    }

    #timeline h2 {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 4.5vw, 2.8rem);
      font-weight: 600;
      text-align: center;
      margin-bottom: 4rem;
    }

    .timeline-list {
      position: relative;
      max-width: 700px;
      margin: 0 auto;
      padding-left: 2.5rem;
    }

    .timeline-list::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 8px;
      bottom: 8px;
      width: 2px;
      border-radius: 2px;
      background: var(--accent-soft);
    }

    .timeline-item {
      position: relative;
      padding-bottom: 3.5rem;
    }

    .timeline-item:last-child {
      padding-bottom: 0;
    }

    .timeline-dot {
      position: absolute;
      left: -2.1rem;
      top: 0.35rem;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--bg);
      border: 3px solid var(--accent);
      z-index: 1;
      box-shadow: 0 0 0 4px var(--bg-soft);
    }

    .timeline-item.current .timeline-dot {
      background: var(--accent);
    }

    .timeline-date {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    .timeline-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .timeline-desc {
      color: var(--text-light);
      font-size: 1rem;
      line-height: 1.8;
    }

    .timeline-actions {
      position: absolute;
      right: 0;
      top: 0;
      display: flex;
      gap: 0.5rem;
    }

    /* ========================
       页脚
       ======================== */
    footer {
      background: var(--accent-soft);
      border-top: 1px solid var(--border);
      padding: 3.5rem 4vw;
      text-align: center;
    }

    .paw {
      width: 22px;
      height: 22px;
      margin: 0 auto 0.8rem;
      opacity: 0.6;
      color: var(--accent);
    }

    footer p {
      font-size: 1rem;
      color: var(--text-light);
      font-family: var(--font-body);
      font-weight: 400;
      letter-spacing: 0.02em;
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.9;
    }

    /* ========================
       全屏预览 Lightbox
       ======================== */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(255, 251, 245, 0.96);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-hover);
    }

    .lightbox-close,
    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      background: rgba(255, 251, 245, 0.8);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      color: var(--text);
      transition: var(--transition);
      padding: 0.8rem;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-close:hover,
    .lightbox-prev:hover,
    .lightbox-next:hover {
      background: var(--accent-soft);
      color: var(--accent-dark);
    }

    .lightbox-close {
      top: 1.5rem;
      right: 1.5rem;
    }

    .lightbox-prev {
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .lightbox-next {
      right: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .lightbox-close svg,
    .lightbox-prev svg,
    .lightbox-next svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
    }

    .lightbox-counter {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-display);
      font-weight: 600;
      color: var(--text-light);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }

    /* ========================
       弹窗 Modal
       ======================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 251, 245, 0.88);
      backdrop-filter: blur(8px);
      z-index: 250;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;

          supabaseErrorMsg = 'ANON KEY 格式无效（长度 ' + (SUPABASE_ANON_KEY ? SUPABASE_ANON_KEY.length : 0) + '），请复制完整密钥';
          logPhase('error', supabaseErrorMsg, true);
          return false;
        }

        if (!window.supabase || typeof window.supabase.createClient !== 'function') {
          supabaseStatus = 'error';
          supabaseErrorMsg = 'SDK 方法不可用';
          logPhase('error', supabaseErrorMsg, true);
          return false;
        }

        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: false }
        });

        supabaseStatus = 'ready';
        var keyType = SUPABASE_ANON_KEY.startsWith('sb_publishable_') ? 'publishable key（自动 key exchange）' : 'JWT';
        logPhase('ready', '客户端已创建 | 密钥: ' + keyType + ' | SDK: ' + supabaseSDKVersion);
        return true;
      } catch (e) {
        supabaseStatus = 'error';
        supabaseErrorMsg = 'createClient 异常: ' + e.message;
        logPhase('error', supabaseErrorMsg, true);
        return false;
      }
    }

    /* =====================================================
       连接验证（带超时）
       ===================================================== */
    async function verifySupabaseConnection(timeoutMs) {
      timeoutMs = timeoutMs || 8000;
      if (!supabase || supabaseStatus !== 'ready') {
        logPhase('mock', '连接验证跳过：supabase 未就绪');
        return false;
      }

      logPhase('ready', '验证表访问...');
      try {
        var result = await Promise.race([
          supabase.from(SITE_CONTENT_TABLE).select('count', { count: 'exact', head: true }),
          new Promise(function(_, reject) {
            setTimeout(function() { reject(new Error('验证超时')); }, timeoutMs);
          })
        ]);

        if (result.error) {
          var msg = result.error.message || '';
          var code = result.error.code || '';
          logPhase('error', '表查询失败', true);
          console.error('  详情:', { message: msg, code: code });

          if (msg.includes('Invalid API key') || code === 'PGRST301' || msg.includes('401')) {
            supabaseErrorMsg = '密钥鉴权失败: ' + msg;
          } else if (msg.includes('does not exist')) {
            supabaseErrorMsg = '表不存在: ' + msg;
          } else {
            supabaseErrorMsg = '连接验证失败: ' + msg;
          }
          return false;
        }

        logPhase('ready', '表「' + SITE_CONTENT_TABLE + '」可正常访问');
        return true;
      } catch (e) {
        logPhase('error', '连接验证异常: ' + (e.message || '网络错误'), true);
        supabaseErrorMsg = '连接验证异常: ' + (e.message || '网络错误');
        return false;
      }
    }

        enterMockMode('云端连接失败: ' + supabaseErrorMsg);

    function getSupabaseError() {
      switch (supabaseStatus) {
        case 'init':         return '正在初始化 Supabase…';
        case 'sdk-loading':  return '正在加载 Supabase SDK…';
        case 'sdk-ready':    return 'SDK 已就绪，正在创建客户端…';

    // 统一处理 Supabase 请求错误
    function handleSupabaseError(err, context) {
      const msg = (err && err.message) ? err.message : String(err || '未知错误');
      const code = (err && err.code) ? err.code : '';
      const details = (err && err.details) ? err.details : '';
      console.error('❌ [' + (context || 'Supabase') + '] ' + msg, { code: code, details: details });

      // 鉴权相关错误 → 触发降级
      if (msg.includes('Invalid API key') || code === 'PGRST301' || msg.includes('401') || msg.includes('Unauthorized')) {
        logPhase('error', '密钥鉴权失败: ' + msg, true);
        showToast('鉴权失败：ANON KEY 无效，请检查配置', 'error');
        enterMockMode('密钥鉴权失败');
        return 'auth';
      }
      // JWT 格式错误 → 触发降级
      if (msg.includes('Invalid Compact JWS') || msg.includes('JWT') || msg.includes('jwt')) {
        logPhase('error', 'JWT 鉴权失败: ' + msg + ' | SDK: ' + supabaseSDKVersion, true);
        showToast('JWT 鉴权失败，已切换本地模式', 'error');
        enterMockMode('JWT 鉴权失败');
        return 'auth';
      }
      // 表不存在 → 触发降级
      if (msg.includes('relation') && msg.includes('does not exist')) {
        logPhase('error', '表不存在: ' + msg, true);
        showToast('表不存在，请执行建表 SQL', 'error');
        enterMockMode('表不存在');
        return 'table';
      }
      // 存储桶不存在
      if (msg.includes('Bucket') && (msg.includes('not found') || msg.includes('NotFound'))) {
        logPhase('error', '存储桶不存在: ' + msg, true);
        showToast('存储桶「' + BUCKET_NAME + '」不存在，请在 Supabase 后台创建', 'error');
        return 'bucket';
      }
      // 存储 401/400
      if (msg.includes('400') || msg.includes('storage') || msg.includes('row-level security')) {
        logPhase('mock', '存储访问失败: ' + msg);
        showToast('存储访问失败，已切换本地图片', 'error');
        return 'storage';
      }
      // 网络错误
      if (msg.includes('fetch') || msg.includes('Network') || msg.includes('Failed to fetch')) {
        showToast('网络请求失败，请检查网络连接', 'error');
        return 'network';
      }
      showToast((context || '操作') + '失败：' + msg, 'error');
      return 'unknown';
    }

    /* =====================================================
       工具函数：图片压缩
       ===================================================== */
    function compressImage(file, maxSide = 1600, quality = 0.85) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width, height } = img;
            if (width > height) {
              if (width > maxSide) { height *= maxSide / width; width = maxSide; }
            } else {
              if (height > maxSide) { width *= maxSide / height; height = maxSide; }
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob((blob) => {
              if (!blob) return reject(new Error('压缩失败'));
              // 保留原始格式（PNG 保留透明通道，WebP 保留体积优势），非图片类型降级为 JPEG
              const outputType = ['image/png', 'image/webp', 'image/jpeg'].includes(file.type) ? file.type : 'image/jpeg';
              const compressedFile = new File([blob], file.name, { type: outputType, lastModified: Date.now() });
              resolve(compressedFile);
            }, file.type === 'image/png' ? 'image/png' : 'image/jpeg', file.type === 'image/png' ? undefined : quality);
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

          <span class="timeline-actions admin-only">
            <button class="icon-btn" data-action="edit-timeline" data-id="${item.id}" aria-label="编辑">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="icon-btn" data-action="delete-timeline" data-id="${item.id}" aria-label="删除">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </span>
        `;
        timelineList.appendChild(div);
      });

      timelineList.querySelectorAll('[data-action="edit-timeline"]').forEach(btn => {
        btn.addEventListener('click', () => openTimelineModal(btn.dataset.id));
      });
      timelineList.querySelectorAll('[data-action="delete-timeline"]').forEach(btn => {
        btn.addEventListener('click', () => deleteTimeline(btn.dataset.id));
      });
    }

    /* =====================================================
       核心：相册（Storage）
       ===================================================== */
    async function loadGallery() {
      if (isMockMode) { renderGallery(); return; }
      if (!supabase) { galleryGrid.innerHTML = '<div class="gallery-empty">' + getSupabaseError() + '</div>'; return; }
      galleryGrid.innerHTML = '<div class="gallery-loading">正在从云端加载照片…</div>';
      try {
        var result = await Promise.race([
          supabase.storage.from(BUCKET_NAME).list(''),
          new Promise(function(_, reject) {
            setTimeout(function() { reject(new Error('加载超时')); }, 10000);
          })
        ]);
        if (result.error) throw result.error;
        galleryPhotos = (result.data || [])
          .filter(function(item) { return item.name && !item.name.startsWith('.emptyFolderPlaceholder'); })
          .sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });
        renderGallery();
      } catch (err) {
        handleSupabaseError(err, '加载相册');
        // 存储失败 → 降级为 mock 图片
        if (!isMockMode) {
          logPhase('mock', '相册加载失败，使用本地图片');
          galleryPhotos = MOCK_IMAGES.slice();
          renderGallery();
        }
      }
    }

    function renderGallery() {
      galleryGrid.innerHTML = '';
      if (galleryPhotos.length === 0) {
        galleryGrid.innerHTML = '<div class="gallery-empty">相册还是空的，管理员可点击右上角上传。</div>';
        return;
      }
      galleryPhotos.forEach(function(file, index) {
        // 获取图片 URL：mock 模式使用占位图，正常模式使用 Supabase 公开 URL
        var url;
        if (file._mockUrl) {
          url = file._mockUrl;
        } else if (supabase && supabase.storage) {
          try {
            var publicUrlResult = supabase.storage.from(BUCKET_NAME).getPublicUrl(file.name);
            url = publicUrlResult.data.publicUrl;
          } catch (e) {
            url = 'https://placekitten.com/400/300';
          }
        } else {
          url = 'https://placekitten.com/400/300';
        }
        var card = document.createElement('div');
        card.className = 'photo-card';
        card.setAttribute('data-index', index);
        card.innerHTML = `
          <img data-src="${url}" alt="${file.name}" loading="lazy" class="lazy-img" style="background-color:#f4ede8;">
          <button class="delete-btn admin-only" data-action="delete-photo" data-name="${file.name}" aria-label="删除">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        `;
        card.addEventListener('click', (e) => {
          if (e.target.closest('.delete-btn')) return;
          openLightbox(index);
        });
        galleryGrid.appendChild(card);
      });

      galleryGrid.querySelectorAll('[data-action="delete-photo"]').forEach(btn => {
        btn.addEventListener('click', () => deletePhoto(btn.dataset.name));
      });

      setupLazyLoad();
    }

    function setupLazyLoad() {
      const lazyImages = document.querySelectorAll('.lazy-img');
      if ('IntersectionObserver' in window) {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              img.src = img.dataset.src;
              img.onload = () => { img.style.backgroundColor = 'transparent'; };
              observer.unobserve(img);
            }
          });
        }, { rootMargin: '50px' });
        lazyImages.forEach(img => observer.observe(img));
      } else {
        lazyImages.forEach(img => {
          img.src = img.dataset.src;
          img.onload = () => { img.style.backgroundColor = 'transparent'; };
        });
      }
    }

    uploadBtn.addEventListener('click', () => {
      if (!isAdmin) return;
      if (isMockMode) { showToast('本地模式不支持上传，请先配置 Supabase', 'error'); return; }
      fileInput.click();
    });

    fileInput.addEventListener('change', async (e) => {
      if (!isAdmin) return;
      if (isMockMode) { showToast('本地模式不支持上传，请先配置 Supabase', 'error'); return; }
      if (!supabase) { showToast(getSupabaseError(), 'error'); return; }
      const files = Array.from(e.target.files);
      if (files.length === 0) return;
      const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
      for (const file of files) {
        if (!validTypes.includes(file.type)) {
          showToast('不支持的格式：' + file.name, 'error');
          fileInput.value = ''; return;
        }
        if (file.size > MAX_FILE_SIZE) {
          showToast('文件过大：' + file.name + '（最大 10MB）', 'error');
          fileInput.value = ''; return;
        }
      }
      uploadProgress.style.display = 'block';
      progressBar.style.width = '0%';
      uploadBtn.disabled = true;
      uploadBtn.style.opacity = '0.6';
      try {
        let completed = 0;
        for (const file of files) {
          const compressed = await compressImage(file);
          const ext = file.name.split('.').pop() || 'jpg';
          const fileName = Date.now() + '_' + Math.random().toString(36).slice(2, 8) + '.' + ext;
          const { error } = await supabase.storage.from(BUCKET_NAME).upload(fileName, compressed, {
            cacheControl: '3600',
            upsert: false
          });
          if (error) throw error;
          completed++;
          progressBar.style.width = Math.round((completed / files.length) * 100) + '%';
        }
        showToast('成功上传 ' + files.length + ' 张照片', 'success');
        await loadGallery();
      } catch (err) {
        handleSupabaseError(err, '上传照片');
      } finally {
        fileInput.value = '';
        uploadProgress.style.display = 'none';
        progressBar.style.width = '0%';
        uploadBtn.disabled = false;
        uploadBtn.style.opacity = '1';
      }
    });

    async function deletePhoto(fileName) {
      if (!isAdmin) return;
      if (isMockMode) { showToast('本地模式不支持删除', 'error'); return; }
      if (!supabase) { showToast(getSupabaseError(), 'error'); return; }
      if (!confirm('确定要删除这张照片吗？')) return;
      try {
        const { error } = await supabase.storage.from(BUCKET_NAME).remove([fileName]);
        if (error) throw error;
        showToast('照片已删除', 'success');
        await loadGallery();
      } catch (err) {
        handleSupabaseError(err, '删除照片');
      }
    }

    /* =====================================================
       弹窗：小猫信息 / 成长时间线
       ===================================================== */
    addInfoBtn.addEventListener('click', () => { if (!isAdmin) return; if (isMockMode) { showToast('本地模式不支持添加，请先配置 Supabase', 'error'); return; } openInfoModal(); });
    addTimelineBtn.addEventListener('click', () => { if (!isAdmin) return; if (isMockMode) { showToast('本地模式不支持添加，请先配置 Supabase', 'error'); return; } openTimelineModal(); });
    modalCancel.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
    modalSave.addEventListener('click', saveModal);

    function openModal(title, htmlBody) {
      modalTitle.textContent = title;
      modalBody.innerHTML = htmlBody;
      // 保存打开前的焦点，用于关闭后恢复
      modalOverlay._previousFocus = document.activeElement;
      modalOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';  // 锁定背景滚动
      // 焦点移到弹窗内第一个可聚焦元素
      requestAnimationFrame(() => {
        const firstFocusable = modal.querySelector('input, button, textarea, [tabindex]:not([tabindex="-1"])');
        if (firstFocusable) firstFocusable.focus();
      });
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      modalMode = null;
      modalEditingId = null;
      document.body.style.overflow = '';  // 恢复背景滚动
      // 恢复焦点到打开弹窗前的元素
      if (modalOverlay._previousFocus) {
        modalOverlay._previousFocus.focus();
        modalOverlay._previousFocus = null;
      }
    }

    // 弹窗焦点陷阱：Tab 键在弹窗内循环
    modal.addEventListener('keydown', (e) => {
      if (e.key !== 'Tab' || !modalOverlay.classList.contains('active')) return;
      const focusable = modal.querySelectorAll(
        'input:not([disabled]), button:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
      );
      if (focusable.length === 0) return;
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault();
        last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault();
        first.focus();
      }
    });

    function openInfoModal(id = null) {
      modalMode = id ? 'edit-info' : 'add-info';
      modalEditingId = id;
      let item = { label: '', content: '' };
      if (id) {
        item = catInfoData.find(i => i.id === id) || item;
      }
      openModal(id ? '编辑信息' : '添加信息', `
        <div class="form-group"><label>信息标签</label><input type="text" id="infoLabel" value="${escapeHtml(item.label)}" placeholder="例如：体重"></div>
        <div class="form-group"><label>信息内容</label><input type="text" id="infoContent" value="${escapeHtml(item.content)}" placeholder="例如：2.3 kg"></div>
      `);
    }

    function openTimelineModal(id = null) {
      modalMode = id ? 'edit-timeline' : 'add-timeline';
      modalEditingId = id;
      let item = { event_date: '', title: '', description: '' };
      if (id) {
        item = timelineData.find(i => i.id === id) || item;
      }
      openModal(id ? '编辑成长节点' : '添加成长节点', `
        <div class="form-group"><label>日期</label><input type="date" id="timelineDate" value="${item.event_date || ''}" max="${new Date().toISOString().split('T')[0]}"></div>
        <div class="form-group"><label>标题</label><input type="text" id="timelineTitle" value="${escapeHtml(item.title)}" placeholder="例如：第一次打疫苗"></div>
        <div class="form-group"><label>描述</label><textarea id="timelineDesc" placeholder="简短描述这一刻">${escapeHtml(item.description || '')}</textarea></div>
      `);
    }

    async function saveModal() {
      if (!isAdmin) return;
      if (isMockMode) { showToast('本地模式不支持保存，请先配置 Supabase', 'error'); return; }
      if (!supabase) { showToast(getSupabaseError(), 'error'); return; }
      try {
        if (modalMode === 'add-info' || modalMode === 'edit-info') {
          const label = document.getElementById('infoLabel').value.trim();
          const content = document.getElementById('infoContent').value.trim();
          if (!label || !content) { showToast('请填写完整信息', 'error'); return; }
          modalSave.disabled = true;
          modalSave.textContent = '保存中…';
          const payload = { label, content };
          if (modalMode === 'edit-info') {
            const { error } = await supabase.from(CAT_INFO_TABLE).update(payload).eq('id', modalEditingId);
            if (error) throw error;
          } else {
            const { error } = await supabase.from(CAT_INFO_TABLE).insert(payload);
            if (error) throw error;
          }
          showToast('信息已保存', 'success');
          await loadCatInfo();
        }
        else if (modalMode === 'add-timeline' || modalMode === 'edit-timeline') {
          const event_date = document.getElementById('timelineDate').value;
          const title = document.getElementById('timelineTitle').value.trim();
          const description = document.getElementById('timelineDesc').value.trim();
          if (!event_date || !title) { showToast('请填写日期和标题', 'error'); return; }
          modalSave.disabled = true;
          modalSave.textContent = '保存中…';
          const payload = { event_date, title, description };
          if (modalMode === 'edit-timeline') {
            const { error } = await supabase.from(TIMELINE_TABLE).update(payload).eq('id', modalEditingId);
            if (error) throw error;
          } else {
            const { error } = await supabase.from(TIMELINE_TABLE).insert(payload);
            if (error) throw error;
          }
          showToast('成长节点已保存', 'success');
          await loadTimeline();
        }
        closeModal();
      } catch (err) {
        handleSupabaseError(err, modalMode.includes('info') ? '保存信息' : '保存时间线');
      } finally {
        modalSave.disabled = false;
        modalSave.textContent = '保存';
      }
    }

    async function deleteCatInfo(id) {
      if (!isAdmin) return;
      if (isMockMode) { showToast('本地模式不支持删除', 'error'); return; }
      if (!supabase) { showToast(getSupabaseError(), 'error'); return; }
      if (!confirm('确定要删除这条信息吗？')) return;
      try {
        const { error } = await supabase.from(CAT_INFO_TABLE).delete().eq('id', id);
        if (error) throw error;
        showToast('信息已删除', 'success');
        await loadCatInfo();
      } catch (err) {
        handleSupabaseError(err, '删除信息');
      }
    }

    async function deleteTimeline(id) {
      if (!isAdmin) return;
      if (isMockMode) { showToast('本地模式不支持删除', 'error'); return; }
      if (!supabase) { showToast(getSupabaseError(), 'error'); return; }
      if (!confirm('确定要删除这条记录吗？')) return;
      try {
        const { error } = await supabase.from(TIMELINE_TABLE).delete().eq('id', id);
        if (error) throw error;
        showToast('记录已删除', 'success');
        await loadTimeline();
      } catch (err) {
        handleSupabaseError(err, '删除时间线');
      }
    }

    /* =====================================================
       全屏预览 Lightbox
       ===================================================== */
    function openLightbox(index) {
      currentLightboxIndex = index;
      updateLightbox();
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lightbox.classList.remove('active');
      // 如果 modal 弹窗还开着，不要恢复滚动
      if (!modalOverlay.classList.contains('active')) {
        document.body.style.overflow = '';
      }
    }
    function updateLightbox() {
      if (!galleryPhotos.length) return;
      const file = galleryPhotos[currentLightboxIndex];
      if (!file) return;
      // mock 模式：使用占位图 URL
      if (file._mockUrl) {
        lightboxImg.src = file._mockUrl;
      } else if (supabase && supabase.storage) {
        try {
          const { data } = supabase.storage.from(BUCKET_NAME).getPublicUrl(file.name);
          lightboxImg.src = data.publicUrl;
        } catch (e) {
          lightboxImg.src = 'https://placekitten.com/400/300';
        }
      } else {
        lightboxImg.src = 'https://placekitten.com/400/300';
      }
      lightboxCounter.textContent = (currentLightboxIndex + 1) + ' / ' + galleryPhotos.length;
    }
    function prevImage() {
      currentLightboxIndex = (currentLightboxIndex - 1 + galleryPhotos.length) % galleryPhotos.length;
      updateLightbox();
    }
    function nextImage() {
      currentLightboxIndex = (currentLightboxIndex + 1) % galleryPhotos.length;
      updateLightbox();
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', (e) => { e.stopPropagation(); prevImage(); });
    lightboxNext.addEventListener('click', (e) => { e.stopPropagation(); nextImage(); });
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', (e) => {
      // Lightbox 快捷键
      if (lightbox.classList.contains('active')) {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'ArrowRight') nextImage();
        return;
      }
      // Modal 弹窗：ESC 关闭
      if (modalOverlay.classList.contains('active') && e.key === 'Escape') {
        closeModal();
        return;
      }
    });

    /* =====================================================
       导航栏滚动毛玻璃 & 移动端汉堡菜单
       ===================================================== */
    // 导航栏滚动毛玻璃效果 + 当前区块高亮（requestAnimationFrame 节流）
    let scrollTicking = false;
    const sections = document.querySelectorAll('section[id]');
    window.addEventListener('scroll', () => {
      if (!scrollTicking) {
        requestAnimationFrame(() => {
          // 毛玻璃效果
          if (window.scrollY > 30) navbar.classList.add('scrolled');
          else navbar.classList.remove('scrolled');
          // 高亮当前区块对应的导航链接
          let current = '';
          sections.forEach(section => {
            const sectionTop = section.offsetTop - 100;
            if (window.scrollY >= sectionTop) current = section.getAttribute('id');
          });
          navLinks.querySelectorAll('a').forEach(a => {
            a.classList.toggle('active', a.getAttribute('href') === `#${current}`);
          });
          scrollTicking = false;
        });
        scrollTicking = true;
      }
    });

    hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => navLinks.classList.remove('open'));
    });
    // 移动端菜单：点击外部区域关闭
    document.addEventListener('click', (e) => {
      if (navLinks.classList.contains('open') &&
          !navLinks.contains(e.target) &&
          !hamburger.contains(e.target)) {
        navLinks.classList.remove('open');
      }
    });

    /* =====================================================
       工具函数：HTML 转义 & 日期格式化
       ===================================================== */
    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d)) return dateStr;
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}年${m}月${day}日`;
    }

    /* =====================================================
       页面初始化
       ===================================================== */
    function loadAllData() {
      // mock 模式：直接渲染本地数据
      if (isMockMode) {
        renderSiteContent();
        renderCatInfo();
        renderTimeline();
        renderGallery();
        return;
      }
      // supabase 未就绪：渲染默认内容 + 占位
      if (!supabase || supabaseStatus !== 'ready') {
        renderSiteContent();
        if (galleryGrid && !galleryGrid.children.length) {
          galleryGrid.innerHTML = '<div class="gallery-empty">' + getSupabaseError() + '</div>';
        }
        if (infoList && !infoList.children.length) {
          infoList.innerHTML = '<div style="color:var(--text-light)">' + getSupabaseError() + '</div>';
        }
        if (timelineList && !timelineList.children.length) {
          timelineList.innerHTML = '<div style="color:var(--text-light);text-align:center;">' + getSupabaseError() + '</div>';
        }
        return;
      }
      loadSiteContent();
      loadCatInfo();
      loadTimeline();
      loadGallery();
    }

    // DOMContentLoaded 仅用于日志输出，实际加载由 bootstrapSupabase 驱动
    document.addEventListener('DOMContentLoaded', function() {
      logPhase('init', 'DOMContentLoaded | supabaseStatus: ' + supabaseStatus + ' | isMockMode: ' + isMockMode);
      if (isMockMode) {
        renderSiteContent();
        renderCatInfo();
        renderTimeline();
        renderGallery();
      }
    });
  </script>
</body>
